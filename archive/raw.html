m där ljus, funktion och stil möts!

Med sina 85 kvm erbjuder denna genomgående bostad ett smart och bekvämt boende med tre sovrum, öppen planlösning mellan kök och vardagsrum samt väl avvägda ytor för både vardag och umgänge.

Ljuset strömmar in genom stora fönster i två väderstreck, och den stora balkongen ger en härlig känsla av rymd samtidigt som du kan njuta av utsikten utan att lämna hemmet.

Vardagsrummet är lättmöblerat med plats för både soffgrupp och matbord, perfekt för sociala stunder. Köket är modernt och praktiskt med gott om arbetsytor och smart förvaring – en dröm för matlagning och middagar tillsammans.

Bostaden rymmer tre generösa sovrum med smarta förvaringslösningar. Huvudsovrummet har dessutom en rymlig klädkammare med fönster – perfekt som walk-in-closet, barnrum eller hemmakontor.

Badrummet är helkaklat med stilrena material och utrustat med dusch och tvättmöjligheter, och kompletteras av en separat toalett.

Brf Söderdepån äger marken och har ett lågt underhållsbehov de närmaste åren. Föreningen består av 99 lägenheter och 3 lokaler som genererar stabila intäkter och långsiktig ekonomi. Här finns dessutom bilpool, el-lådcykel och tre elcyklar – perfekt för dig som vill ha flexibilitet utan att behöva äga bil. Fastigheten och gården förvaltas av Einar Mattsson och erbjuder en arkitektritad innergård med utegrupper, planteringar, lekytor och gemensam grillplats i pergola. Byggnaden är certifierad enligt Miljöbyggnad Silver, vilket ger möjlighet till gröna lån och ränterabatt.

Läget är mycket attraktivt – lugnt och naturskönt med promenadstråk längs vattnet, grönområden och utsiktsplatser, men ändå nära stadens puls och all service. Kommunikationerna är utmärkta med flera busslinjer i närheten, och sommartid kan du ta turbåtarna M/S Lisen eller M/S Lotten till Hammarby sjöstad eller M/S Emelie till city samt Djurgården. Ett område med stark utveckling och långsiktig potential – perfekt för dig som vill bo centralt med rogivande omgivningar.

emensam grillplats i pergola. Byggnaden är certifierad enligt Miljöbyggnad Silver, vilket ger möjlighet till gröna lån och ränterabatt.\r\n\r\nLäget är mycket attraktivt – lugnt och naturskönt med promenadstråk längs vattnet, grönområden och utsiktsplatser, men ändå nära stadens puls och all service. Kommunikationerna är utmärkta med flera busslinjer i närheten, och sommartid kan du ta turbåtarna M/S Lisen eller M/S Lotten till Hammarby sjöstad eller M/S Emelie till city samt Djurgården. Ett område med stark utveckling och långsiktig potential – perfekt för dig som vill bo centralt med rogivande omgivningar.\r\n\r\nVälkommen hem till våning 5 – ett ljust, luftigt och genomtänkt boende där du kan trivas länge!"])</script><script>self.__next_f.push([1,"2b:T4d2,(29/11-25) Vi håller på med budgetarbetet så vågar inte säga något bindande men som det ser ut nu bör avgiften hållas kvar på nuvarande nivå. \nBra att ha med sig kring avgiften är att vi från september 2026 har gemensamt bredband som kommer debiteras boende, blir\nen lägre kostnad än vad alla betalar idag separat. Här kan vi tyvärr inte gå ut med pris ännu men kommer vara en mycket lägre kostnad oavsett. \n-Vi amorterar enligt den ekonomiska planen varje år. Inga nya lån har upptagits, de vars bindningstid\nlöpt ut har fått lägre räntenivåer. Så föreningens räntekostnader har minskat. \n\n\n(29/9-25) Finns det planer eller beslut på att förändra avgiften?\n-Nej\nÄger föreningen marken?\n-Ja \nHar föreningen amorterat, omförhandlat eller tagit nya lån och hur mycket sen senaste\nårsredovisningen?\n-Inga nya lån har tillkommit. Översikt av lån finns i senaste årsredovisningen. \nI det fall någon av lånen förfallit under året, vilken ränta har ni fått på dessa lån? Det är av intresse för\nen framtida köpare.\n-De lån som löpt ut under året har en kort bindningstid som ligger inom intervallet för rörlig ränta.\nNuvarande nivå innan vilkorsändringsdag ligger runt 2,8 procent.2c:T8f9,"])</script><script>self.__next_f t.\",\"provider_id\":\"HAN3D71FCA7A72948EF84E9A8A9364FBDE5\",\"rating_link\":\"https://www.hittamaklare.se/mikael.rantala\",\"allow_log_on\":true,\"cal_username\":\"mikael-rantala\",\"municipality\":{\"id\":18,\"name\":\"Stockholm\"},\"rating_count\":387,\"notifications\":null,\"cal_invite_sent\":true,\"employee_number\":10932,\"municipality_id\":18,\"normalized_name\":\"mikael rantala\",\"cal_meeting_type\":\"meeting\",\"description_body\":\"Jag är en driven och resultatinriktad och extremt målmedveten mäklare, som med största lyhördhet och noggrannhet alltid strävar efter att både köpare och säljare ska känna sig nöjda och trygga med sitt bostadsbyte. Genom att vara tillgänglig och lyhörd skapar jag långa och spännande kundrelationer genom att bli rekommenderad vidare av mina fantastiska kunder. Som kund hos mig kan man förvänta sig 100% professionellt arbete genom hela processen och att få det högsta slutpriset.\",\"description_title\":\"Professionell, förtroendeingivande och trygg\",\"ourly_calendar_id\":\"afs42igtfhcg09gf62\",\"title_user_edited\":null,\"cloudflare_image_id\":\"610b9a6f-2a56-4176-471b-5bfc433b6c00\",\"has_synced_calendar\":true,\"cal_onboarding_completed\":true},\"additional_contact\":{\"id\":784449,\"name\":\"Anna Karlahag\",\"email\":\"anna.karlahag@erikolsson.se\",\"phone\":\"072 565 89 89\",\"title\":\"Reg. Fastighetsmäklare\",\"rating\":5,\"location\":{\"crs\":{\"type\":\"name\",\"properties\":{\"name\":\"EPSG:4326\"}},\"type\":\"MultiPolygon\",\"coordinates\":[[[[18.066649925355183,59.31050785200894],[18.0676798936169,59.30888696494675],[18.067121994141804,59.30805458751337],[18.069053184632526,59.307616485944294],[18.073859703187214,59.3073974330434],[18.076305877808796,59.30759458071769],[18.074632179383503,59.311493488798945],[18.066649925355183,59.31050785200894]]],[[[18.051690473838736,59.31527368452893],[18.053664579673697,59.31225131053813],[18.05435122518151,59.31247033217493],[18.05533827809899,59.311966580301196],[18.062891378684927,59.31295217480999],[18.06083144216149,59.31641248040165],[18.051690473838736,59.31527368452893]]]]},\"provider\":\"vitec\",\"agency_id\":1,\"avatar_id\":\"MED5P37CW82P5ZZVFWG20\",\"is_active\":false,\"is_broker\":true,\"is_hidden\":false,\"office_id\":null,\"created_at\":\"2025-08-29T14:31:04.735822+00:00\",\"has_avatar\":true,\"updated_at\":\"2026-03-24T10:49:09.446+00:00\",\"avatar_hash\":\"346fe6aab07c8c276e4967962bba8a7b78f7c019ba2c960b768cd5c4426466c7\",\"cal_user_id\":224,\"description\":\"Trygg | Målmedveten | Engagerad\\n\\nAtt sälja och köpa en bostad är en av livets största affärer – och min roll som mäklare är att se till att den blir både trygg och lönsam. Jag arbetar målmedvetet, strategiskt och med fullt fokus på att maximera värdet i varje affär.\\n\\nMed en lång bakgrund inom försäljning, kommunikation och rekrytering har jag stor vana av att möta människor i viktiga skeden i livet – och att skapa trygghet, tydlighet och förtroende när det verkligen behövs.\\n\\nJag har levt på och runt Södermalm i över 20 år och känner området väl. Det hjälper mig att lyfta fram det unika i varje bostad och att skapa rätt förutsättningar för köpare och säljare att mötas i varje affär.\\n\\nMin drivkraft är att göra din försäljning både trygg och framgångsrik – från första möte till sista handslag – alltid med målet att du som säljare ska få högsta möjliga slutpris.\\n\\nJag ser fram emot att få hjälpa dig genom en trygg och framgångsrik bostadsaffär. Välkommen att höra av dig!\",\"provider_id\":\"HAN04939187709F4F80B729A98F2D1C1A73\",\"rating_link\":\"https://www.hittamaklare.se/anna.karlahag\",\"allow_log_on\":true,\"cal_username\":\"anna-karlahag\",\"municipality\":{\"id\":18,\"name\":\"Stockholm\"},\"rating_count\":6,\"notifications\":null,\"cal_invite_sent\":true,\"employee_number\":null,\"municipality_id\":18,\"normalized_name\":\"anna karlahag\",\"cal_meeting_type\":\"meeting\",\"description_body\":\"Att sälja och köpa en bostad är en av livets största af .\r\n\r\nBostaden rymmer tre generösa sovrum med smarta förvaringslösningar. Huvudsovrummet har dessutom en rymlig klädkammare med fönster – perfekt som walk-in-closet, barnrum eller hemmakontor.\r\n\r\nBadrummet är helkaklat med stilrena material och utrustat med dusch och tvättmöjligheter, och kompletteras av en separat toalett.\r\n\r\nBrf Söderdepån äger marken och har ett lågt underhållsbehov de närmaste åren. Föreningen består av 99 lägenheter och 3 lokaler som genererar stabila intäkter och långsiktig ekonomi. Här finns dessutom bilpool, el-lådcykel och tre elcyklar – perfekt för dig som vill ha flexibilitet utan att behöva äga bil. Fastigheten och gården förvaltas av Einar Mattsson och erbjuder en arkitektritad innergård med utegrupper, planteringar, lekytor och gemensam grillplats i pergola. Byggnaden är certifierad enligt Miljöbyggnad Silver, vilket ger möjlighet till gröna lån och ränterabatt.\r\n\r\nLäget är mycket attraktivt – lugnt och naturskönt med promenadstråk längs vattnet, grönområden och utsiktsplatser, men ändå nära stadens puls och all service. Kommunikationerna är utmärkta med flera busslinjer i närheten, och sommartid kan du ta turbåtarna M/S Lisen eller M/S Lotten till Hammarby sjöstad eller M/S Emelie till city samt Djurgården. Ett område med stark utveckling och långsiktig potential – perfekt för dig som vill bo centralt med rogivande omgivningar.\r\n\r\nVälkommen hem till våning 5 – ett ljust, luftigt och genomtänkt boende där du kan trivas länge!, Södermalm, Stockholm. Erik Olsson Fastighetsförmedling är Sveriges ledande fastighetsmäklare med 4.9/5 i betyg från 35 035+ omdömen på hittamaklare.se."])</script><script>self.__next_f.push([1,"2e:T99a,"])</script><script>self.__next_f.push([1,"Varmt välkomna till denna rymliga och välplanerade fyrarummare på våning 5 – ett hem där ljus, funktion och stil möts!\r\n\r\nMed sina 85 kvm erbjuder denna genomgående bostad ett smart och bekvämt boende med tre sovrum, öppen planlösning mellan kök och
